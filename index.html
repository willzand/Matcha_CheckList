<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ชา Check List</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: #f0f0f5; color: #333; }
        .container { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.08); }

        /* Header */
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1.25rem 1rem 1rem; }
        .header h1 { font-size: 20px; font-weight: 600; text-align: center; margin-bottom: 0.75rem; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0.75rem; }
        .stat-card { background: rgba(255,255,255,0.18); border-radius: 10px; padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.25); }
        .stat-label { font-size: 11px; opacity: 0.85; margin-bottom: 3px; }
        .stat-value { font-size: 20px; font-weight: 700; }

        /* Currency Toggle */
        .currency-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px; background: rgba(255,255,255,0.12); border-radius: 10px; }
        .currency-bar span { font-size: 12px; opacity: 0.85; }
        .toggle-wrap { position: relative; width: 48px; height: 24px; }
        .toggle-wrap input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.3); border-radius: 24px; cursor: pointer; transition: 0.3s; }
        .toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle-wrap input:checked + .toggle-slider { background: rgba(255,255,255,0.6); }
        .toggle-wrap input:checked + .toggle-slider:before { transform: translateX(24px); }
        .currency-label { font-size: 13px; font-weight: 600; min-width: 40px; text-align: center; }


        /* Filter */
        .filter-section { display: flex; gap: 6px; padding: 10px 12px; flex-wrap: wrap; background: #fafafa; border-bottom: 1px solid #eee; align-items: center; }
        .filter-btn { padding: 6px 13px; border: 1.5px solid #ddd; background: white; border-radius: 20px; font-size: 12px; cursor: pointer; font-weight: 500; color: #666; transition: all 0.2s; }
        .filter-btn:active { transform: scale(0.96); }
        .filter-btn.active { background: #667eea; border-color: #667eea; color: white; }
        .filter-btn.reset { margin-left: auto; }
        .filter-btn.save-btn { background: #667eea; border-color: #667eea; color: white; }
        .filter-btn.refresh-btn { background: white; border-color: #ddd; color: #666; }

        /* Sync bar */
        .sync-bar { font-size: 11px; padding: 5px 12px; text-align: center; display: none; }
        .sync-bar.ok  { background: #e8f5e9; color: #2e7d32; }
        .sync-bar.err { background: #fce4ec; color: #c62828; display: block; }

        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 10px 10px 20px; }

        /* Shop Group */
        .shop-group { margin-bottom: 14px; border-radius: 14px; overflow: hidden; border: 1px solid #e8e8e8; }
        .shop-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #f5f5fa; border-bottom: 1px solid #e8e8e8; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        .shop-header:active { background: #eeeefc; }
        .shop-header-left { display: flex; align-items: center; gap: 8px; }
        .shop-name { font-weight: 700; font-size: 14px; color: #444; }
        .shop-badge { font-size: 11px; background: #667eea; color: white; border-radius: 10px; padding: 2px 8px; font-weight: 600; }
        .shop-badge.done { background: #4caf50; }
        .shop-total { font-size: 13px; font-weight: 700; color: #667eea; }
        .shop-chevron { font-size: 12px; color: #aaa; transition: transform 0.2s; }
        .shop-group.collapsed .shop-chevron { transform: rotate(-90deg); }
        .shop-group.collapsed .shop-items { display: none; }

        /* Item */
        .shop-items { background: white; }
        .item-card { padding: 11px 14px; display: flex; gap: 10px; align-items: center; cursor: pointer; transition: background 0.15s; user-select: none; -webkit-tap-highlight-color: transparent; border-top: 1px solid #f0f0f0; }
        .item-card:first-child { border-top: none; }
        .item-card:active { background: #f5f5f5; }
        .item-card.checked { opacity: 0.45; background: #fafafa; }
        .checkbox { width: 22px; height: 22px; border: 2px solid #ccc; border-radius: 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; transition: all 0.15s; }
        .item-card.checked .checkbox { background: #667eea; border-color: #667eea; color: white; }
        .item-img { width: 44px; height: 44px; flex-shrink: 0; border-radius: 8px; border: 1px solid #eee; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 18px; overflow: hidden; }
        .item-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .item-content { flex: 1; min-width: 0; }
        .item-type { font-size: 13px; color: #333; font-weight: 500; }
        .item-card.checked .item-type { text-decoration: line-through; color: #bbb; }
        .item-price-wrap { text-align: right; flex-shrink: 0; }
        .item-price { font-weight: 700; color: #667eea; font-size: 14px; display: block; }
        .item-price-sub { font-size: 10px; color: #bbb; margin-top: 1px; display: block; }
        .qty-wrap { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
        .qty-btn { width: 22px; height: 22px; border: 1.5px solid #ddd; background: white; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #667eea; line-height: 1; flex-shrink: 0; }
        .qty-btn:active { background: #f0f0ff; }
        .qty-val { font-size: 13px; font-weight: 600; color: #444; min-width: 20px; text-align: center; }

        .empty-state { text-align: center; padding: 3rem 1rem; color: #bbb; font-size: 14px; }
        .footer { background: #fafafa; border-top: 1px solid #eee; padding: 8px; text-align: center; font-size: 10px; color: #ccc; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🍵 ชา Check List</h1>
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">ซื้อแล้ว</div>
                <div class="stat-value"><span id="checkedCount">0</span>/<span id="totalCount">0</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label">ยอดที่เหลือ</div>
                <div class="stat-value" id="totalPrice">-</div>
            </div>
        </div>
        <div class="currency-bar">
            <span class="currency-label" id="lblLeft">¥ JPY</span>
            <label class="toggle-wrap">
                <input type="checkbox" id="currToggle">
                <span class="toggle-slider"></span>
            </label>
            <span class="currency-label">฿ THB</span>
        </div>
    </div>

    <div id="syncBar" class="sync-bar err">กำลังโหลดข้อมูล...</div>

    <div class="filter-section">
        <button class="filter-btn active" data-filter="all">ทั้งหมด</button>
        <button class="filter-btn" data-filter="unchecked">ยังไม่ซื้อ</button>
        <button class="filter-btn" data-filter="checked">ซื้อแล้ว</button>
        <button class="filter-btn reset" data-filter="reset">🔄 รีเซ็ต</button>
        <button class="filter-btn refresh-btn" id="refreshBtn">🔄 โหลด</button>
        <button class="filter-btn save-btn" id="saveBtn">💾 Save</button>
    </div>

    <div class="content">
        <div id="shopList"><div class="empty-state">กำลังโหลด...</div></div>
    </div>

    <div class="footer" id="footer">เชื่อมต่อ Google Sheets</div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyjC0xsS-h21ULaZTdy1lG-_wtKngxGdCiForP3tJSEkyNV-u-jOsq7p0U4ulxuYD_M9A/exec';

var allData = [];
var currentFilter = 'all';
var showTHB = false;
var rate = 0.24;
var checked = {};
var collapsed = {};  // เก็บสถานะพับ/펼치기 ของแต่ละร้าน

try { collapsed = JSON.parse(localStorage.getItem('col')  || '{}'); } catch(e) { collapsed = {}; }
try { rate      = parseFloat(localStorage.getItem('rate')) || 0.24; } catch(e) {}
try { showTHB   = localStorage.getItem('curr') === 'THB'; } catch(e) {}
var pendingUpdates = {}; // { rowIndex: checked }
var pendingQty = {};      // { rowIndex: qty }

document.getElementById('currToggle').checked = showTHB;


function save(key, val) { try { localStorage.setItem(key, typeof val === 'string' ? val : JSON.stringify(val)); } catch(e) {} }

// Currency toggle
document.getElementById('currToggle').addEventListener('change', function() {
    showTHB = this.checked;
    
    save('curr', showTHB ? 'THB' : 'JPY');
    renderShops();
});

// Format price
function fmt(item) {
    if (showTHB) {
        var p = item.totalTHB > 50 ? item.totalTHB : Math.round(item.totalJPY * rate);
        return p > 0 ? '฿' + p.toLocaleString('th-TH') : '฿?';
    } else {
        var p = item.totalJPY > 50 ? item.totalJPY : Math.round(item.totalTHB / rate);
        return p > 0 ? '¥' + p.toLocaleString('ja-JP') : '¥?';
    }
}
function fmtSub(item) {
    if (showTHB) {
        var p = item.totalJPY > 50 ? item.totalJPY : Math.round(item.totalTHB / rate);
        return p > 0 ? '¥' + p.toLocaleString('ja-JP') : '';
    } else {
        var p = item.totalTHB > 50 ? item.totalTHB : Math.round(item.totalJPY * rate);
        return p > 0 ? '฿' + p.toLocaleString('th-TH') : '';
    }
}
function getPrice(item) {
    if (showTHB) return item.totalTHB > 50 ? item.totalTHB : Math.round(item.totalJPY * rate);
    return item.totalJPY > 50 ? item.totalJPY : Math.round(item.totalTHB / rate);
}
function fmtTotal(total) {
    return (showTHB ? '฿' : '¥') + total.toLocaleString('th-TH');
}

// Group items by shop
function groupByShop(items) {
    var groups = {};
    var order = [];
    items.forEach(function(item) {
        if (!groups[item.name]) { groups[item.name] = []; order.push(item.name); }
        groups[item.name].push(item);
    });
    return order.sort(function(a, b) { return a.localeCompare(b, "en"); }).map(function(name) { var sorted = groups[name].sort(function(a,b){ return a.type.localeCompare(b.type, "en"); }); return { name: name, items: sorted }; });
}

// Render
function renderShops() {
    var filtered = allData;
    if (currentFilter === 'checked')   filtered = allData.filter(function(d){ return d.checked; });
    if (currentFilter === 'unchecked') filtered = allData.filter(function(d){ return !d.checked; });

    var shopList = document.getElementById('shopList');

    if (filtered.length === 0) {
        shopList.innerHTML = '<div class="empty-state">' + (allData.length === 0 ? 'กำลังโหลด...' : 'ไม่มีรายการ') + '</div>';
        updateStats();
        return;
    }

    var groups = groupByShop(filtered);

    shopList.innerHTML = groups.map(function(group) {
        var shopKey = group.name;
        var isCollapsed = !!collapsed[shopKey];
        var doneCount  = group.items.filter(function(i){ return i.checked; }).length;
        var totalCount = group.items.length;
        var allDone    = doneCount === totalCount;
        var remaining  = group.items.filter(function(i){ return !i.checked; });
        var shopTotal  = remaining.reduce(function(s,i){ return s + getPrice(i) * (i.qty || 1); }, 0);

        var itemsHtml = group.items.map(function(item) {
            var imgSrc = '';
            if (item.image && item.image.indexOf('drive.google.com/uc?id=') !== -1) {
                var fileId = item.image.replace(/.*[?&]id=([^&]+).*/, '$1');
                imgSrc = 'https://lh3.googleusercontent.com/d/' + fileId + '=w100';
            } else if (item.image && item.image.indexOf('http') === 0) {
                imgSrc = item.image;
            }
            var imgHtml = imgSrc
                ? '<div class="item-img"><img src="' + imgSrc + '" onerror="this.parentNode.innerHTML=\'🍵\'"></div>'
                : '<div class="item-img">🍵</div>';
            return '<div class="item-card' + (item.checked ? ' checked' : '') + '" data-key="' + item.id + '">'
                + '<div class="checkbox">' + (item.checked ? '✓' : '') + '</div>'
                + imgHtml
                + '<div class="item-content"><div class="item-type">' + esc(item.type) + '</div><div class="qty-wrap"><button class="qty-btn" data-qid="' + item.id + '" data-action="minus">−</button><span class="qty-val" id="qv-' + item.id + '">' + item.qty + '</span><button class="qty-btn" data-qid="' + item.id + '" data-action="plus">+</button><span style="font-size:11px;color:#aaa">ชิ้น</span></div></div>'
                + '<div class="item-price-wrap">'
                +   '<span class="item-price">' + fmt(item) + '</span>'
                +   '<span class="item-price-sub">' + fmtSub(item) + '</span>'
                + '</div></div>';
        }).join('');

        return '<div class="shop-group' + (isCollapsed ? ' collapsed' : '') + '" data-shop="' + esc(shopKey) + '">'
            + '<div class="shop-header">'
            +   '<div class="shop-header-left">'
            +     '<span class="shop-name">' + esc(group.name) + '</span>'
            +     '<span class="shop-badge' + (allDone ? ' done' : '') + '">' + doneCount + '/' + totalCount + '</span>'
            +   '</div>'
            +   '<div style="display:flex;align-items:center;gap:8px">'
            +     (remaining.length > 0 ? '<span class="shop-total">' + fmtTotal(shopTotal) + '</span>' : '<span style="font-size:13px">✅</span>')
            +     '<span class="shop-chevron">▼</span>'
            +   '</div>'
            + '</div>'
            + '<div class="shop-items">' + itemsHtml + '</div>'
            + '</div>';
    }).join('');

    // Shop header click = collapse/expand
    shopList.querySelectorAll('.shop-header').forEach(function(hdr) {
        hdr.addEventListener('click', function() {
            var group = this.parentNode;
            var shopKey = group.dataset.shop;
            group.classList.toggle('collapsed');
            collapsed[shopKey] = group.classList.contains('collapsed');
            save('col', collapsed);
        });
    });

    // Item click = check/uncheck
    shopList.querySelectorAll('.item-card').forEach(function(card) {
        card.addEventListener('click', function(e) {
            e.stopPropagation();
            var key = this.dataset.key;
            var item = allData.find(function(d){ return String(d.id) === key; });
            if (item) {
                item.checked = !item.checked;
                pendingUpdates[item.id] = item.checked;
                showSaveIndicator();
                renderShops();
            }
        });
    });

    updateStats();

    // qty +/- buttons
    shopList.querySelectorAll('.qty-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var id = parseInt(this.dataset.qid);
            var action = this.dataset.action;
            var item = allData.find(function(d){ return d.id === id; });
            if (!item) return;
            if (action === 'plus') {
                item.qty += 1;
            } else {
                if (item.qty > 1) item.qty -= 1;
            }
            // อัปเดต qty display
            var el = document.getElementById('qv-' + id);
            if (el) el.textContent = item.qty;
            // mark pending qty update
            if (!pendingQty) pendingQty = {};
            pendingQty[id] = item.qty;
            showSaveIndicator();
            updateStats();
        });
    });
}

function updateStats() {
    var c = allData.filter(function(d){ return d.checked; }).length;
    var remaining = allData.filter(function(d){ return !d.checked; });
    var total = remaining.reduce(function(s,d){ return s + getPrice(d) * (d.qty || 1); }, 0);
    document.getElementById('checkedCount').textContent = c;
    document.getElementById('totalCount').textContent = allData.length;
    document.getElementById('totalPrice').textContent = allData.length > 0 ? fmtTotal(total) : '-';
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// JSONP
var _timeout;
window._cb = function(result) {
    clearTimeout(_timeout);
    if (!result || !result.success || !result.items) {
        showSync('⚠️ ' + (result ? result.error : 'ข้อมูลผิดพลาด'), true);
        return;
    }
    allData = result.items.map(function(item) {
        return {
            ids: [item.id],
            id: item.id,
            name: item.name,
            type: item.type,
            qty: item.qty || 1,
            totalJPY: item.priceJPY || 0,
            totalTHB: item.priceTHB || 0,
            image: item.image || '',
            checked: item.checked || false
        };
    });
    renderShops();
    showSync('✓ อัปเดต ' + new Date().toLocaleTimeString('th-TH'), false);
    document.getElementById('footer').textContent = 'อัปเดต ' + new Date().toLocaleTimeString('th-TH') + ' • ' + allData.length + ' รายการ';
};

function loadData() {
    var old = document.getElementById('_js');
    if (old) old.parentNode.removeChild(old);
    var s = document.createElement('script'); s.id = '_js';
    s.src = SCRIPT_URL + '?callback=_cb&t=' + Date.now();
    _timeout = setTimeout(function(){ showSync('⚠️ เชื่อมต่อไม่ได้', true); }, 10000);
    document.head.appendChild(s);
}

function showSync(msg, isErr) {
    var bar = document.getElementById('syncBar');
    bar.textContent = msg;
    bar.className = 'sync-bar ' + (isErr ? 'err' : 'ok');
    bar.style.display = 'block';
    if (!isErr) setTimeout(function(){ bar.style.display = 'none'; }, 3000);
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var f = this.dataset.filter;
        if (f === 'reset') {
            allData.forEach(function(d){ d.checked = false; pendingUpdates[d.id] = false; });
            showSaveIndicator();
            document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
            document.querySelector('[data-filter="all"]').classList.add('active');
            currentFilter = 'all';
        } else {
            document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
            this.classList.add('active');
            currentFilter = f;
        }
        renderShops();
    });
});

renderShops();
loadData();

// Save indicator - แสดงเมื่อมีการเปลี่ยนแปลง
function showSaveIndicator() {
    var btn = document.getElementById('saveBtn');
    btn.textContent = '💾 Save *';
    btn.style.background = '#ff9800';
    btn.style.borderColor = '#ff9800';
    btn.style.color = 'white';
}

// Save button - บันทึกกลับ Google Sheets
document.getElementById('saveBtn').addEventListener('click', function() {
    var keys = Object.keys(pendingUpdates);
    if (keys.length === 0) {
        var btn = this;
        btn.textContent = '✅ Up to date';
        setTimeout(function() { btn.textContent = '💾 Save'; btn.style.background=''; btn.style.borderColor=''; }, 1500);
        return;
    }

    var btn = this;
    btn.textContent = '⏳ Saving...';
    btn.style.background = '#667eea';
    btn.style.borderColor = '#667eea';
    btn.disabled = true;

    var updates = keys.map(function(rowId) {
        return { rowIndex: parseInt(rowId), checked: pendingUpdates[rowId] };
    });

    // รวม qty updates ด้วย
    var qtyKeys = Object.keys(pendingQty);
    qtyKeys.forEach(function(rowId) {
        var existing = updates.find(function(u){ return u.rowIndex === parseInt(rowId); });
        if (existing) {
            existing.qty = pendingQty[rowId];
        } else {
            updates.push({ rowIndex: parseInt(rowId), qty: pendingQty[rowId], checked: null });
        }
    });

    fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({ updates: updates })
    })
    .then(function(r) { return r.json(); })
    .then(function(result) {
        if (result.success) {
            pendingUpdates = {};
                    pendingQty = {};
            btn.textContent = '✅ Saved!';
            btn.style.background = '#4caf50';
            btn.style.borderColor = '#4caf50';
        } else {
            btn.textContent = '❌ Error';
            btn.style.background = '#f44336';
        }
        btn.disabled = false;
        setTimeout(function() {
            btn.textContent = '💾 Save';
            btn.style.background = '';
            btn.style.borderColor = '';
            btn.style.color = '';
        }, 2000);
    })
    .catch(function(err) {
        btn.textContent = '❌ Failed';
        btn.style.background = '#f44336';
        btn.disabled = false;
        setTimeout(function() {
            btn.textContent = '💾 Save *';
            btn.style.background = '#ff9800';
            btn.style.borderColor = '#ff9800';
        }, 2000);
    });
});;
</script>
</body>
</html>
